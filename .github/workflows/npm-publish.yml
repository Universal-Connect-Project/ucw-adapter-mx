name: 'Auto-publish NPM Package'

on: pull_request

#on:
#  push:
#    branches:
#      - main

jobs:
  push_to_registry:
    name: 'Setup, and publish'
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out the repo'
        uses: actions/checkout@v4

      - name: 'Set up Node'
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version: 'lts/*'
          check-latest: true

      - name: 'Dependencies and tests'
        run: |
          npm ci
          npm run build --workspace packages/mx-adapter

          echo "$(pwd)"

          # Remove test files/folders so they aren't published to NPM
          find ./packages/mx-adapter/dist -name "*.test.*" -delete
          find ./packages/mx-adapter/dist -name "test" -type d  | xargs rm -rf;
          
          ls ./packages/mx-adapter/dist/esm -al

